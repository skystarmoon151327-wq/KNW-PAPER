<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eoulrim Copy Paper | KNW ICT Business Division</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* [필독] 모든 스타일을 강제로 초기화하여 잘림을 원천 봉쇄합니다. */
        .cert-wrapper { 
            height: 180px !important; 
            padding: 30px !important; 
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            background-color: #ffffff !important;
            border: 1px solid #e2e8f0 !important;
            border-radius: 12px !important;
            overflow: hidden !important;
            margin: 10px !important;
        }

        /* 이미지가 박스보다 커도 '무조건' 안쪽으로 맞추는 절대 설정 */
        .fit-img { 
            display: block !important;
            max-width: 100% !important; 
            max-height: 100% !important; 
            width: auto !important;
            height: auto !important;
            object-fit: contain !important; /* 비율 유지하며 박스 안에 다 넣기 */
            margin: auto !important;
        }

        /* 제품 이미지는 기존 유지 */
        .product-wrapper { height: 260px !important; padding: 15px !important; border: 1px solid #e2e8f0; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        
        body { font-family: sans-serif; scroll-behavior: smooth; margin: 0; padding: 0; }
        .hero-bg { 
            background: linear-gradient(rgba(0, 40, 85, 0.6), rgba(0, 40, 85, 0.6)), 
            url('https://i.ibb.co/RTy2j12t/image.jpg'); 
            background-size: cover; background-position: center; height: 400px; display: flex; align-items: center; justify-content: center; color: white; text-align: center;
        }
    </style>
</head>
<body>

    <header class="bg-white shadow px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="font-bold text-blue-900 text-xl">EOULRIM COPY PAPER</div>
        <nav class="space-x-4 text-xs font-bold uppercase">
            <a href="#products">Products</a>
            <a href="#certifications">Certifications</a>
            <a href="#inquiry">Inquiry</a>
        </nav>
    </header>

    <section class="hero-bg">
        <div>
            <h1 class="text-6xl font-bold mb-4">EOULRIM</h1>
            <p class="text-xl opacity-90">Premium Quality & Social Value</p>
        </div>
    </section>

    <section id="products" class="py-20 container mx-auto px-6 text-center">
        <h2 class="text-3xl font-bold mb-10 text-blue-900">PRODUCT PORTFOLIO</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div class="product-wrapper"><img src="https://i.ibb.co/RTy2j12t/image.jpg" class="fit-img"></div>
            <div class="product-wrapper"><img src="https://i.ibb.co/FLdkpt8K/image.jpg" class="fit-img"></div>
            <div class="product-wrapper"><img src="https://i.ibb.co/hR4Y1dLZ/image.jpg" class="fit-img"></div>
            <div class="product-wrapper"><img src="https://i.ibb.co/c9t5K1F/image.jpg" class="fit-img"></div>
            <div class="product-wrapper"><img src="https://i.ibb.co/svnrp8DP/image.jpg" class="fit-img"></div>
            <div class="product-wrapper"><img src="https://i.ibb.co/N6Mj3TqQ/image.jpg" class="fit-img"></div>
            <div class="product-wrapper"><img src="https://i.ibb.co/nqcr5fTy/image.jpg" class="fit-img"></div>
            <div class="product-wrapper bg-blue-50"><strong>PREMIUM<br>PAPER</strong></div>
        </div>
    </section>

    <section id="certifications" class="py-20 bg-gray-50 text-center">
        <div class="container mx-auto px-6">
            <h2 class="text-3xl font-bold mb-10 text-blue-900">CERTIFICATIONS</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-5xl mx-auto">
                <div class="cert-wrapper"><img src="https://i.ibb.co/5g11bWQ0/image.jpg" class="fit-img"></div>
                <div class="cert-wrapper"><img src="https://i.ibb.co/cKYFh2Fm/image.jpg" class="fit-img"></div>
                <div class="cert-wrapper"><img src="https://i.ibb.co/39Xm89YQ/image.jpg" class="fit-img"></div>
                <div class="cert-wrapper"><img src="https://i.ibb.co/mrWSwXtH/image.jpg" class="fit-img"></div>
            </div>
        </div>
    </section>

    <section id="inquiry" class="py-20 text-center">
        <h2 class="text-3xl font-bold mb-10 text-blue-900">INQUIRY</h2>
        <form action="https://formspree.io/f/nanoom@nanoom114.com" method="POST" class="max-w-xl mx-auto bg-gray-100 p-8 rounded-lg text-left">
            <div class="mb-4"><label class="block font-bold mb-2">Company</label><input type="text" name="company" required class="w-full p-2 rounded border"></div>
            <div class="mb-4"><label class="block font-bold mb-2">Email</label><input type="email" name="_replyto" required class="w-full p-2 rounded border"></div>
            <div class="mb-4"><label class="block font-bold mb-2">Message</label><textarea name="message" rows="4" required class="w-full p-2 rounded border"></textarea></div>
            <button type="submit" class="w-full bg-blue-900 text-white font-bold py-3 rounded">SEND MESSAGE</button>
        </form>
    </section>

    <footer class="bg-slate-900 text-white py-10 text-center text-sm">
        <p>Korea Nanum Welfare Association ICT Division</p>
        <p>nanoom@nanoom114.com | Tel: +82-44-863-3900</p>
    </footer>

</body>
</html>
