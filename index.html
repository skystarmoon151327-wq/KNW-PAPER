<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eoulrim Copy Paper | KNW ICT Business Division</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans', sans-serif; scroll-behavior: smooth; }
        h1, h2, h3 { font-family: 'Montserrat', sans-serif; }
        .hero-bg { 
            background: linear-gradient(rgba(0, 40, 85, 0.6), rgba(0, 40, 85, 0.6)), 
            url('https://i.ibb.co/PZNp3Kwg/image.jpg'); 
            background-size: cover; background-position: center; 
        }
        .img-container { display: flex; justify-content: center; align-items: center; overflow: hidden; background-color: #f9fafb; }
        .product-img { max-width: 100%; max-height: 250px; object-fit: contain; }
        .cert-img { max-width: 100%; max-height: 200px; object-fit: contain; }
    </style>
</head>
<body class="bg-white text-gray-800">

    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-xl font-bold text-blue-900 leading-none">KNW ICT Business Div.</span>
                <span class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Korea Nanum Welfare Association</span>
            </div>
            <nav class="hidden md:flex space-x-8 font-semibold text-xs">
                <a href="#home" class="hover:text-blue-600">HOME</a>
                <a href="#products" class="hover:text-blue-600">PRODUCTS</a>
                <a href="#certifications" class="hover:text-blue-600">CERTIFICATIONS</a>
                <a href="#inquiry" class="bg-blue-900 text-white px-5 py-2 rounded hover:bg-blue-800 transition">INQUIRY</a>
            </nav>
        </div>
    </header>

    <section id="home" class="hero-bg h-[500px] flex items-center text-white text-center">
        <div class="container mx-auto px-6">
            <h1 class="text-5xl md:text-7xl font-bold mb-6 uppercase">Eoulrim Copy Paper</h1>
            <p class="text-xl opacity-90 mb-10 tracking-wide">Premium Quality & Social Value for Global Partners</p>
            <a href="#inquiry" class="bg-blue-600 text-white px-10 py-3 rounded-full font-bold shadow-lg hover:bg-blue-700 transition">Send Inquiry Now</a>
        </div>
    </section>

    <section id="inquiry" class="py-24 bg-white border-t">
        <div class="container mx-auto px-6 max-w-4xl">
            <div class="text-center mb-12">
                <h2 class="text-4xl font-bold mb-4 text-blue-900 uppercase">Inquiry Form</h2>
                <p class="text-gray-500">Please fill out the form below for product quantities and quotes.</p>
            </div>
            
            <form action="https://formspree.io/f/nanoom@nanoom114.com" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-gray-50 p-8 rounded-2xl shadow-inner border">
                <div>
                    <label class="block text-sm font-bold mb-2 uppercase">Your Name / Company</label>
                    <input type="text" name="company" required class="w-full p-3 rounded border border-gray-300 focus:outline-none focus:border-blue-900">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2 uppercase">Your Email Address</label>
                    <input type="email" name="_replyto" required class="w-full p-3 rounded border border-gray-300 focus:outline-none focus:border-blue-900">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold mb-2 uppercase">Subject (Product Name / Quantity)</label>
                    <input type="text" name="subject" placeholder="e.g., A4 80gsm / 20 Pallets" required class="w-full p-3 rounded border border-gray-300 focus:outline-none focus:border-blue-900">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold mb-2 uppercase">Message Details</label>
                    <textarea name="message" rows="5" required placeholder="Describe your requirements..." class="w-full p-3 rounded border border-gray-300 focus:outline-none focus:border-blue-900"></textarea>
                </div>
                <div class="md:col-span-2 text-center mt-4">
                    <button type="submit" class="bg-blue-900 text-white px-12 py-4 rounded-full font-bold text-lg hover:bg-black transition-all shadow-xl">SUBMIT INQUIRY</button>
                </div>
            </form>
        </div>
    </section>

    <footer id="contact" class="bg-slate-900 text-white py-20">
        </footer>

</body>
</html>
